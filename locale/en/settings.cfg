[mod-setting-name]
100k-territory-size=Territory size
100k-point-resource-multiplier=Point-resource multiplier

[mod-setting-description]
100k-territory-size=Average size, in tiles, of each Voronoi territory that a resource is assigned to.
100k-point-resource-multiplier=Multiplier applied to the probability, richness and frequency of point-resources (infinite resources such as crude oil, sulfuric acid geysers and fluorine vents) instead of confining them to a Voronoi territory.
