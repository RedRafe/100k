[mod-setting-name]
100k-territory-size=Territory size
100k-point-resource-multiplier=Point-resource multiplier
100k-technology-difficulty=Technology difficulty

[mod-setting-description]
100k-territory-size=Average size, in tiles, of each Voronoi territory that a resource is assigned to.
100k-point-resource-multiplier=Multiplier applied to the probability, richness and frequency of point-resources (infinite resources such as crude oil, sulfuric acid geysers and fluorine vents) instead of confining them to a Voronoi territory.
100k-technology-difficulty=[color=red]Hard[/color]: cost always set to 100k, no tech adjustments.\n[color=65,105,225]Normal[/color]: some tech adjustments to make early game less tedious, and the multiplier is forced to 100k only if not already set higher.\n[color=green]Easy[/color]: some tech adjustments to make early game less tedious, multiplier is never forced, and biters spawn much further from the starting area.

[string-mod-setting]
100k-technology-difficulty-easy=[color=green]Easy[/color]
100k-technology-difficulty-normal=[color=65,105,225]Normal[/color]
100k-technology-difficulty-hard=[color=red]Hard[/color]
